<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RifariRD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --neon:#22c55e;
  --cyan:#06b6d4;
  --purple:#8b5cf6;
}
*{box-sizing:border-box}
body{
  margin:0;
  padding:20px;
  font-family:'Segoe UI',system-ui;
  min-height:100vh;
  background:radial-gradient(circle at top,#0ea5e9,#020617 65%);
  color:#fff;
}
.container{
  max-width:480px;
  margin:auto;
  padding:26px;
  border-radius:28px;
  background:rgba(2,6,23,.85);
  backdrop-filter:blur(18px);
  box-shadow:0 40px 120px rgba(0,0,0,.8);
}
.logo{width:200px;display:block;margin:0 auto 10px}
h1{text-align:center;margin:0;font-size:28px}
.premio{
  text-align:center;
  font-size:22px;
  font-weight:900;
  margin:8px 0 20px;
  background:linear-gradient(90deg,var(--neon),var(--cyan));
  -webkit-background-clip:text;
  color:transparent;
}
label{margin-top:14px;display:block;color:#c7d2fe}
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #1e293b;
  background:#020617;
  color:#fff;
  margin-top:6px;
}
.ticket-control{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:10px;
}
.ticket-control button{
  padding:10px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--cyan),var(--neon));
  font-weight:800;
  cursor:pointer;
  color:#052e16;
}
.total{text-align:center;font-size:20px;margin:14px 0}
button.main{
  width:100%;
  padding:16px;
  border:none;
  border-radius:20px;
  font-size:16px;
  font-weight:900;
  background:linear-gradient(135deg,var(--neon),var(--cyan),var(--purple));
  cursor:pointer;
  color:#052e16;
}

/* TICKETS */
.ticket{
  margin-top:14px;
  padding:14px;
  border-radius:18px;
  background:#020617;
  border:1px solid #1e293b;
  text-align:center;
}
.ticket img{width:130px;margin-top:8px}

/* VERIFICACIÓN */
.verify-box{
  margin-top:30px;
  padding:20px;
  border-radius:22px;
  border:1px solid #1e293b;
  background:linear-gradient(180deg,#020617,#020617cc);
}
.verify-title{
  text-align:center;
  font-weight:900;
  font-size:18px;
  margin-bottom:10px;
  background:linear-gradient(90deg,var(--neon),var(--cyan));
  -webkit-background-clip:text;
  color:transparent;
}
.verify-user{
  text-align:center;
  font-size:14px;
  color:#c7d2fe;
  margin-bottom:10px;
}

/* PROGRESO */
.progress-bar{
  width:100%;
  height:16px;
  background:#020617;
  border-radius:999px;
  border:1px solid #1e293b;
  overflow:hidden;
  margin-top:16px;
}
.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--neon),var(--cyan),var(--purple));
}
.progress-text{text-align:center;margin-top:6px;font-size:13px;color:#c7d2fe}

/* LEGAL */
.legal{margin-top:26px;font-size:12px;color:#94a3b8;text-align:center}
</style>
</head>

<body>
<div class="container">

<img src="logo.png" class="logo">
<h1>RifariRD</h1>
<p class="premio">🎉 Rifando RD$50,000 🎉</p>

<label>Nombre</label><input id="nombre">
<label>Apellido</label><input id="apellido">
<label>Teléfono</label><input id="telefono">

<label>Cantidad de tickets</label>
<input id="cantidad" type="number" min="1" value="1">

<div class="ticket-control">
  <button onclick="sumar(1)">+1</button>
  <button onclick="sumar(5)">+5</button>
  <button onclick="sumar(10)">+10</button>
  <button onclick="sumar(50)">+50</button>
</div>

<div class="total">Total a pagar: <b>RD$ <span id="total">25</span></b></div>

<label>Comprobante de pago</label>
<input type="file" id="comprobante" accept="image/*">

<button class="main" onclick="registrar()">Registrar y asignar tickets</button>

<div id="resultado"></div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-text" id="progressText">0% vendidos</div>

<!-- 🔎 VERIFICACIÓN -->
<div class="verify-box">
  <div class="verify-title">🔎 Verificar mis tickets</div>
  <input id="buscarTel" placeholder="Ingresa tu teléfono">
  <button class="main" onclick="buscar()">Verificar</button>
  <div id="lista"></div>
</div>

<p class="legal">
RifariRD es una rifa digital independiente.<br>
El ganador será seleccionado cuando se venda el 100% de los boletos.
</p>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyCKyR0Y8oTMDvQOI_j03uRMQiqjZvBysxw",
  authDomain: "rifarird.firebaseapp.com",
  projectId: "rifarird",
  storageBucket: "rifarird.appspot.com"
});
});
const db = firebase.firestore();
const storage = firebase.storage();

const PRECIO = 25;
const TOTAL = 10000;

const cantidadEl = document.getElementById("cantidad");
const totalEl = document.getElementById("total");
cantidadEl.oninput = () => totalEl.textContent = (cantidadEl.value||1)*PRECIO;

function sumar(n){
  cantidadEl.value = +cantidadEl.value + n;
  cantidadEl.oninput();
}

function generarQR(num){
  return `https://jeffreyalex11.github.io/RifariRD/ticket.html?id=${num}`;
}

async function registrar(){
  const nombre = document.getElementById("nombre").value.trim();
  const apellido = document.getElementById("apellido").value.trim();
  const telefono = document.getElementById("telefono").value.trim();
  const cantidad = Number(cantidadEl.value);
  const file = document.getElementById("comprobante").files[0];

  if(!nombre || !apellido || !telefono || !file){
    alert("Completa todos los datos y sube el comprobante");
    return;
  }

  const resultado = document.getElementById("resultado");
  resultado.innerHTML = "<h3>⏳ Generando tickets...</h3>";

  const ref = storage.ref("comprobantes/" + Date.now() + "_" + file.name);
  await ref.put(file);
  const url = await ref.getDownloadURL();

  for(let i=0;i<cantidad;i++){
    let num;
    do{
      num = Math.floor(Math.random()*TOTAL).toString().padStart(4,"0");
    }while((await db.collection("tickets").doc(num).get()).exists);

    const qr = generarQR(num);
    resultado.innerHTML += `
      <div class="ticket">
        🎟️ <b>${num}</b><br>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${qr}">
      </div>
    `;

    await db.collection("tickets").doc(num).set({
      nombre, apellido, telefono,
      numero:num, qr, comprobante:url,
      fecha:new Date().toISOString()
    });

    await db.collection("stats").doc("global").update({
      vendidos: firebase.firestore.FieldValue.increment(1)
    });
  }
}

async function buscar(){
  const tel = document.getElementById("buscarTel").value.trim();
  const lista = document.getElementById("lista");
  lista.innerHTML = "Buscando...";

  const q = await db.collection("tickets").where("telefono","==",tel).get();
  if(q.empty){
    lista.innerHTML = "❌ No se encontraron tickets";
    return;
  }

  lista.innerHTML = "";
  let nombre = "", apellido = "";

  q.forEach(d=>{
    const t = d.data();
    nombre = t.nombre;
    apellido = t.apellido;
    lista.innerHTML += `
      <div class="ticket">
        🎟️ <b>${t.numero}</b><br>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${t.qr}">
      </div>
    `;
  });

  lista.innerHTML =
    `<div class="verify-user">👤 ${nombre} ${apellido}</div>` +
    lista.innerHTML;
}
</script>

</body>
</html>
