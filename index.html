<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RifariRD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --neon:#22c55e;
  --cyan:#06b6d4;
  --purple:#8b5cf6;
}
*{box-sizing:border-box}
body{
  margin:0;
  padding:20px;
  font-family:'Segoe UI', system-ui;
  min-height:100vh;
  background:radial-gradient(circle at top,#0ea5e9,#020617 65%);
  color:#fff;
}
.container{
  max-width:460px;
  margin:auto;
  padding:24px;
  border-radius:26px;
  background:rgba(2,6,23,.78);
  backdrop-filter:blur(18px);
  box-shadow:0 30px 80px rgba(0,0,0,.65);
}
.logo{width:220px;display:block;margin:auto}
h1{text-align:center}
.premio{
  text-align:center;
  font-size:20px;
  font-weight:900;
  background:linear-gradient(90deg,var(--neon),var(--cyan));
  -webkit-background-clip:text;
  color:transparent;
}
label{margin-top:14px;display:block}
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #1e293b;
  background:#020617;
  color:#fff;
}
.ticket-control{display:flex;gap:8px;margin-top:8px}
.ticket-control button{
  flex:1;padding:10px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--cyan),var(--neon));
  font-weight:800;cursor:pointer;color:#052e16;
}
.total{text-align:center;font-size:18px;margin:12px 0}
button.main{
  width:100%;padding:16px;border:none;border-radius:20px;
  font-size:16px;font-weight:900;
  background:linear-gradient(135deg,var(--neon),var(--cyan),var(--purple));
  cursor:pointer;color:#052e16;
}
button.main:disabled{
  opacity:.6;cursor:not-allowed
}
.ticket{
  margin-top:14px;padding:14px;border-radius:16px;
  background:#020617;border:1px solid #1e293b;text-align:center;
}
.ticket img{width:140px;margin-top:8px}
.progress-box{margin-top:15px}
.progress-bar{
  width:100%;height:14px;background:#020617;
  border-radius:999px;border:1px solid #1e293b;overflow:hidden
}
.progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#22c55e,#06b6d4,#8b5cf6);
  transition:width .3s ease;
}
.progress-text{text-align:center;font-size:13px;color:#c7d2fe;margin-top:6px}
.legal{margin-top:30px;font-size:12px;color:#94a3b8;text-align:center}
</style>
</head>

<body>
<div class="container">

<img src="logo.png" class="logo">
<h1>RifariRD</h1>
<p class="premio">🎉 Rifando RD$50,000 🎉</p>

<label>Nombre</label><input id="nombre">
<label>Apellido</label><input id="apellido">
<label>Teléfono</label><input id="telefono">

<label>Cantidad de tickets</label>
<input id="cantidad" type="number" min="1" value="1">

<div class="ticket-control">
  <button onclick="sumar(1)">+1</button>
  <button onclick="sumar(5)">+5</button>
  <button onclick="sumar(10)">+10</button>
  <button onclick="sumar(50)">+50</button>
</div>

<div class="total">Total a pagar: <b>RD$ <span id="total">25</span></b></div>

<label>Comprobante</label>
<input type="file" id="comprobante" accept="image/*">

<label style="margin-top:10px;display:flex;gap:10px">
  <input type="checkbox" id="terminos">
  <span>Acepto los <b>términos establecidos</b></span>
</label>

<button class="main" id="btnRegistrar" onclick="registrar()">Registrar y asignar tickets</button>

<div id="resultado"></div>

<div class="progress-box">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-text" id="progressText">0% vendidos</div>
</div>

<hr>

<h2>🔎 Ver mis tickets</h2>
<input id="buscarTel" placeholder="Teléfono">
<button class="main" onclick="buscar()">Buscar</button>
<div id="lista"></div>

<p class="legal">
  El ganador será seleccionado únicamente cuando se haya vendido el <b>100%</b> de los boletos.
</p>

</div>

<!-- 🔥 FIREBASE COMPAT -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyCKyR0Y8oTMDvQOI_j03uRMQiqjZvBysxw",
  authDomain: "rifarird.firebaseapp.com",
  projectId: "rifarird",
  storageBucket: "rifarird.appspot.com",
  messagingSenderId: "1025146093171",
  appId: "1:1025146093171:web:cfbb5d16d59b14f89c3406"
});

const db = firebase.firestore();
const storage = firebase.storage();

const TOTAL_TICKETS = 10000;
const PRECIO = 25;

const nombre = nombreEl = document.getElementById("nombre");
const apellidoEl = document.getElementById("apellido");
const telefonoEl = document.getElementById("telefono");
const comprobanteEl = document.getElementById("comprobante");
const terminosEl = document.getElementById("terminos");
const cantidadEl = document.getElementById("cantidad");
const totalEl = document.getElementById("total");
const resultadoEl = document.getElementById("resultado");
const listaEl = document.getElementById("lista");
const buscarTelEl = document.getElementById("buscarTel");
const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");
const btnRegistrar = document.getElementById("btnRegistrar");

cantidadEl.oninput = () => totalEl.textContent = (cantidadEl.value || 1) * PRECIO;

function sumar(n){
  cantidadEl.value = +cantidadEl.value + n;
  cantidadEl.oninput();
}

function generarQR(n){
  return `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${n}`;
}

/* 📊 PROGRESO GLOBAL */
db.collection("stats").doc("global").onSnapshot(doc=>{
  if(!doc.exists) return;
  const { vendidos, total } = doc.data();
  const pct = Math.min(Math.round((vendidos/total)*100),100);
  progressFill.style.width = pct + "%";
  progressText.textContent = pct + "% vendidos";
  if(pct >= 100){
    btnRegistrar.disabled = true;
    btnRegistrar.textContent = "🎉 Rifa completada";
  }
});

/* 🎟️ REGISTRAR */
async function registrar(){
  if(!nombreEl.value||!apellidoEl.value||!telefonoEl.value||!terminosEl.checked||!comprobanteEl.files.length){
    alert("Completa todos los datos");
    return;
  }

  resultadoEl.innerHTML = "<h3>⏳ Generando tickets...</h3>";
  const cont = document.createElement("div");
  resultadoEl.appendChild(cont);

  const ref = storage.ref("comprobantes/"+Date.now()+"_"+comprobanteEl.files[0].name);
  await ref.put(comprobanteEl.files[0]);
  const url = await ref.getDownloadURL();

  for(let i=0;i<cantidadEl.value;i++){
    let num;
    do{
      num = Math.floor(Math.random()*TOTAL_TICKETS).toString().padStart(4,"0");
    }while((await db.collection("tickets").doc(num).get()).exists);

    const qr = generarQR(num);
    cont.innerHTML += `<div class="ticket">🎟️ <b>${num}</b><br><img src="${qr}"></div>`;
    await new Promise(r=>requestAnimationFrame(r));

    await db.collection("tickets").doc(num).set({
      nombre:nombreEl.value.trim(),
      apellido:apellidoEl.value.trim(),
      telefono:telefonoEl.value.trim(),
      numero:num,
      qr,
      comprobante:url,
      fecha:new Date().toISOString()
    });

    await db.collection("stats").doc("global").update({
      vendidos: firebase.firestore.FieldValue.increment(1)
    });
  }
}

async function buscar(){
  listaEl.innerHTML="Buscando...";
  const q = await db.collection("tickets")
    .where("telefono","==",buscarTelEl.value.trim()).get();
  listaEl.innerHTML = q.empty ? "Sin tickets" : "";
  q.forEach(d=>{
    listaEl.innerHTML += `<div class="ticket">${d.data().numero}<br><img src="${d.data().qr}"></div>`;
  });
}
</script>

</body>
</html>
