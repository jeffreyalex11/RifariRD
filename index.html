<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RifariRD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --neon:#22c55e;
  --cyan:#06b6d4;
  --purple:#8b5cf6;
}
*{box-sizing:border-box}
body{
  margin:0;padding:20px;
  font-family:'Segoe UI',system-ui;
  min-height:100vh;
  background:radial-gradient(circle at top,#0ea5e9,#020617 65%);
  color:#fff;
}
.container{
  max-width:460px;margin:auto;padding:24px;
  border-radius:26px;
  background:rgba(2,6,23,.78);
  backdrop-filter:blur(18px);
}
h1{text-align:center;font-size:26px;margin-bottom:12px;}
.premio{font-size:20px;font-weight:900;text-align:center;background:linear-gradient(90deg,var(--neon),var(--cyan));-webkit-background-clip:text;color:transparent;}

input, button{font-size:16px;}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #1e293b;background:#020617;color:#fff;margin-top:6px;}

button.main{
  width:100%;padding:14px;margin-top:14px;
  background:linear-gradient(135deg,var(--neon),var(--cyan),var(--purple));
  border:none;border-radius:14px;font-weight:800;color:#052e16;cursor:pointer;
}
button.main:disabled{opacity:.6;cursor:not-allowed;}

.ticket{margin-top:14px;padding:14px;border-radius:14px;background:#020617;border:1px solid #1e293b;text-align:center;}
.ticket img{width:120px;margin-top:8px;}

.progress-bar{margin-top:12px;height:14px;background:#020617;border-radius:999px;border:1px solid #1e293b;overflow:hidden;}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#06b6d4,#8b5cf6);transition:width .3s;}
</style>
</head>
<body>

<div class="container">
  <h1>RifariRD</h1>
  <p class="premio">🎉 Rifando RD$50,000 🎉</p>

  <label>Nombre</label>
  <input id="nombre" placeholder="Ingresa tu nombre">

  <label>Apellido</label>
  <input id="apellido" placeholder="Ingresa tu apellido">

  <label>Teléfono</label>
  <input id="telefono" placeholder="8091234567">

  <label>Cantidad de tickets</label>
  <input id="cantidad" type="number" min="1" value="1">

  <p>Total a pagar: <b>RD$ <span id="total">25</span></b></p>

  <label><input type="checkbox" id="terminos"> Acepto los términos</label>

  <button class="main" id="btnRegistrar" onclick="registrar()">Registrar y asignar tickets</button>

  <div id="resultado"></div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <p id="progressText">0% vendidos</p>

  <hr>

  <h3>🔎 Ver mis tickets</h3>
  <input id="buscarTel" placeholder="Teléfono para buscar">
  <button class="main" onclick="buscar()">Buscar</button>
  <div id="lista"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyCKyR0Y8oTMDvQOI_j03uRMQiqjZvBysxw",
  authDomain:"rifarird.firebaseapp.com",
  projectId:"rifarird",
});

const db = firebase.firestore();
const PRECIO = 25;

const totalEl = document.getElementById("total");
document.getElementById("cantidad").oninput = e => {
  totalEl.textContent = (e.target.value || 1) * PRECIO;
};

function generarQR(n){
  return `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${n}`;
}

db.collection("stats").doc("global").onSnapshot(doc=>{
  if(!doc.exists) return;
  const { vendidos, total } = doc.data();
  const pct = Math.round((vendidos/total)*100);
  document.getElementById("progressFill").style.width = pct + '%';
  document.getElementById("progressText").textContent = pct + '% vendidos';
});

async function registrar(){
  const nombre = document.getElementById("nombre").value.trim();
  const apellido = document.getElementById("apellido").value.trim();
  const telefono = document.getElementById("telefono").value.trim();
  const cantidad = Number(document.getElementById("cantidad").value);

  if(!nombre || !apellido || !telefono || !document.getElementById("terminos").checked){
    alert("Completa todos los datos");
    return;
  }

  const resultado = document.getElementById("resultado");
  resultado.innerHTML = "<h3>⏳ Generando tickets...</h3>";

  for(let i=0; i<cantidad; i++){
    const num = Math.floor(Math.random()*10000).toString().padStart(4, "0");
    const qr = generarQR(num);

    const div = document.createElement("div");
    div.className = "ticket";
    div.innerHTML = `🎟️ <b>${num}</b><br><img src="${qr}">`;
    resultado.appendChild(div);

    await db.collection("tickets").doc(num).set({
      nombre, apellido, telefono,
      numero:num, qr,
      fecha:new Date().toISOString()
    });

    await db.collection("stats").doc("global").update({
      vendidos: firebase.firestore.FieldValue.increment(1)
    });
  }
}

async function buscar(){
  const tel = document.getElementById("buscarTel").value.trim();
  const lista = document.getElementById("lista");
  lista.innerHTML = "";
  const q = await db.collection("tickets").where("telefono","==", tel).get();
  q.forEach(d => {
    lista.innerHTML += `<div class="ticket">${d.data().numero}<br><img src="${d.data().qr}"></div>`;
  });
}
</script>

</body>
</html>
